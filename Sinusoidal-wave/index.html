<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Properties of Sound </title>
  <style>
    :root {
      --ink-blue: #003b73;
      --light-gray: #e6e6e6;
      --axis-gray: #555;
      --text: #1f2937;
      --panel: #f8fafc;
      --border: #d9e2ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #ffffff;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(8px, 2vw, 18px);
      overflow: hidden;
    }

    .container {
      width: min(1100px, 100%);
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--ink-blue);
      font-size: clamp(1.15rem, 2.6vw, 2.1rem);
      text-align: center;
    }

    .subtitle {
      margin: 0 0 clamp(6px, 1.5vh, 14px);
      text-align: center;
      font-size: clamp(0.78rem, 1.5vw, 1rem);
      color: #4b5563;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 59, 115, 0.08);
      overflow: visible;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .canvas-wrap {
      width: 100%;
      background: white;
      padding: clamp(6px, 1.5vw, 14px);
      flex: 1;
      min-height: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #ffffff;
      border: 1px solid var(--light-gray);
      border-radius: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: clamp(6px, 1.4vw, 14px);
      padding: clamp(8px, 1.6vw, 14px);
      background: var(--panel);
      border-top: 1px solid var(--border);
    }

    .control-group {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(8px, 1.5vw, 12px);
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-weight: 700;
      color: var(--ink-blue);
      margin-bottom: 8px;
    }

    .value {
      font-weight: 700;
      color: #111827;
      background: #eef6ff;
      border: 1px solid #c8def2;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
      font-size: clamp(0.72rem, 1.4vw, 0.9rem);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--ink-blue);
      cursor: pointer;
    }

    .info-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      margin-left: 6px;
      border: 1px solid var(--ink-blue);
      border-radius: 50%;
      color: var(--ink-blue);
      background: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: help;
      flex: 0 0 auto;
    }

    .info-icon::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      width: min(260px, 72vw);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(0, 59, 115, 0.16);
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 400;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .info-icon::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #ffffff;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 11;
    }

    .info-icon:hover::after,
    .info-icon:hover::before,
    .info-icon:focus-visible::after,
    .info-icon:focus-visible::before {
      opacity: 1;
    }

    @media (max-width: 760px),
    (max-height: 640px) {
      .controls {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .control-group {
        padding: 7px;
      }

      label {
        font-size: 0.8rem;
        gap: 4px;
        margin-bottom: 5px;
      }

      .value {
        padding: 2px 6px;
      }

      h1 {
        font-size: clamp(1rem, 3.4vw, 1.5rem);
      }

      .subtitle {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .control-group {
        padding: 7px 9px;
      }
    }

    @media (max-height: 520px) {
      h1 {
        display: none;
      }

      .subtitle {
        display: none;
      }

      .controls {
        grid-template-columns: repeat(3, 1fr);
      }

      .control-group {
        padding: 6px;
      }

      label {
        margin-bottom: 3px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Properties of Sound</h1>
    <p class="subtitle">Change amplitude and frequency in real time to see how sound-wave properties change.</p>

    <section class="card" aria-label="Interactive sound wave simulator">
      <div class="canvas-wrap">
        <canvas id="waveCanvas"
          aria-label="Sinusoidal waveform graph with amplitude on the y-axis and time on the x-axis"></canvas>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="amplitudeSlider">
            <span>Amplitude <span class="info-icon" tabindex="0"
                data-tooltip="Amplitude controls wave height. In hearing, larger amplitude is related to greater loudness.">i</span></span>
            <span class="value" id="amplitudeValue">1.00</span>
          </label>
          <input id="amplitudeSlider" type="range" min="0" max="1" step="0.01" value="0.50" />
        </div>

        <div class="control-group">
          <label for="frequencySlider">
            <span>Frequency (Hz) <span class="info-icon" tabindex="0"
                data-tooltip="Frequency (Hz) controls how many cycles occur per second. In hearing, higher frequency is related to higher pitch.">i</span></span>
            <span class="value" id="frequencyValue">4.0 Hz</span>
          </label>
          <input id="frequencySlider" type="range" min="0.5" max="12" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <label for="speedSlider">
            <span>Animation Speed <span class="info-icon" tabindex="0"
                data-tooltip="Animation speed changes how fast the wave moves, while the x-axis remains a fixed time window.">i</span></span>
            <span class="value" id="speedValue">1.0×</span>
          </label>
          <input id="speedSlider" type="range" min="0" max="5" step="0.1" value="0.1" />
        </div>
      </div>

    </section>
  </main>

  <script>
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const amplitudeSlider = document.getElementById('amplitudeSlider');
    const frequencySlider = document.getElementById('frequencySlider');
    const speedSlider = document.getElementById('speedSlider');
    const amplitudeValue = document.getElementById('amplitudeValue');
    const frequencyValue = document.getElementById('frequencyValue');
    const speedValue = document.getElementById('speedValue');

    const inkBlue = '#003b73';
    const lightGray = '#e6e6e6';
    const axisGray = '#555555';

    let phase = 0;
    let lastTime = performance.now();

    function resizeCanvas() {
      const card = document.querySelector('.card');
      const canvasWrap = document.querySelector('.canvas-wrap');
      const controls = document.querySelector('.controls');
      const heading = document.querySelector('h1');
      const subtitle = document.querySelector('.subtitle');
      const viewportHeight = window.innerHeight || 700;
      const verticalChrome = heading.offsetHeight + subtitle.offsetHeight + controls.offsetHeight + 34;
      const availableHeight = Math.max(170, viewportHeight - verticalChrome);
      canvasWrap.style.height = `${availableHeight}px`;
      card.style.maxHeight = `${Math.max(360, viewportHeight - 16)}px`;

      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawArrow(fromX, fromY, toX, toY) {
      const headLength = 10;
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 6), toY - headLength * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 6), toY - headLength * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawGrid(left, top, width, height) {
      ctx.strokeStyle = lightGray;
      ctx.lineWidth = 1;

      const verticalLines = 10;
      const horizontalLines = 8;

      for (let i = 0; i <= verticalLines; i++) {
        const x = left + (width / verticalLines) * i;
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, top + height);
        ctx.stroke();
      }

      for (let i = 0; i <= horizontalLines; i++) {
        const y = top + (height / horizontalLines) * i;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(left + width, y);
        ctx.stroke();
      }
    }

    function drawAxes(left, top, width, height) {
      const centerY = top + height / 2;
      ctx.strokeStyle = axisGray;
      ctx.fillStyle = axisGray;
      ctx.lineWidth = 2;
      ctx.font = '14px Arial, Helvetica, sans-serif';

      drawArrow(left, centerY, left + width + 10, centerY);
      drawArrow(left, top + height, left, top - 10);

      ctx.fillText('Time (s)', left + width - 33, centerY + 28);

      ctx.save();
      ctx.translate(left - 42, top + 225);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Amplitude', 0, 0);
      ctx.restore();

      ctx.font = '12px Arial, Helvetica, sans-serif';
      ctx.fillText('+', left - 18, top + 8);
      ctx.fillText('0', left - 18, centerY + 4);
      ctx.fillText('−', left - 18, top + height + 2);
    }

    function drawWave(left, top, width, height, amplitude, frequency) {
      const centerY = top + height / 2;
      const maxAmplitude = height * 0.43;
      const displayAmplitude = amplitude * maxAmplitude;
      const duration = 1.0; // seconds shown across the graph

      ctx.strokeStyle = inkBlue;
      ctx.lineWidth = 4;
      ctx.beginPath();

      for (let x = 0; x <= width; x++) {
        const time = (x / width) * duration;
        const y = centerY - displayAmplitude * Math.sin(2 * Math.PI * frequency * time + phase);
        if (x === 0) ctx.moveTo(left + x, y);
        else ctx.lineTo(left + x, y);
      }

      ctx.stroke();
    }

    function drawInfo(left, top, amplitude, frequency, animationSpeed) {
      ctx.fillStyle = inkBlue;
      const compact = canvas.clientWidth < 620;
      ctx.font = `bold ${compact ? 13 : 16}px Arial, Helvetica, sans-serif`;
      if (compact) {
        ctx.fillText(`Amplitude = ${amplitude.toFixed(2)}`, left, top - 16);
        ctx.fillText(`Frequency = ${frequency.toFixed(1)} Hz`, left, top + 2);
        ctx.fillText(`Speed = ${animationSpeed.toFixed(1)}×`, left, top + 20);
      } else {
        ctx.fillText(`Amplitude = ${amplitude.toFixed(2)}`, left, top);
        ctx.fillText(`Frequency = ${frequency.toFixed(1)} Hz`, left + 180, top);
        ctx.fillText(`Speed = ${animationSpeed.toFixed(1)}×`, left + 355, top);
      }
    }

    function animate(now) {
      const elapsed = (now - lastTime) / 1000;
      lastTime = now;

      const amplitude = Number(amplitudeSlider.value);
      const frequency = Number(frequencySlider.value);
      const animationSpeed = Number(speedSlider.value);
      amplitudeValue.textContent = amplitude.toFixed(2);
      frequencyValue.textContent = `${frequency.toFixed(1)} Hz`;
      speedValue.textContent = `${animationSpeed.toFixed(1)}×`;

      // The horizontal time window stays fixed. Frequency changes the number of
      // cycles visible per second; this separate speed control changes only how
      // fast the waveform moves across time.
      phase += elapsed * 2 * Math.PI * animationSpeed * 0.35;

      const cssWidth = canvas.clientWidth;
      const cssHeight = canvas.clientHeight;
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const isSmall = cssWidth < 620;
      const margin = {
        left: isSmall ? 58 : 80,
        right: isSmall ? 22 : 40,
        top: isSmall ? 58 : 44,
        bottom: isSmall ? 52 : 62
      };
      const plotLeft = margin.left;
      const plotTop = margin.top;
      const plotWidth = cssWidth - margin.left - margin.right;
      const plotHeight = cssHeight - margin.top - margin.bottom;

      drawGrid(plotLeft, plotTop, plotWidth, plotHeight);
      drawAxes(plotLeft, plotTop, plotWidth, plotHeight);
      drawWave(plotLeft, plotTop, plotWidth, plotHeight, amplitude, frequency);
      drawInfo(plotLeft, 26, amplitude, frequency, animationSpeed);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    requestAnimationFrame(animate);
  </script>
</body>

</html>
